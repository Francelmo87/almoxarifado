{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}

<h2>Entrada do Estoque
    <span class="pull-right">
        <a href="{% url 'estoque:estoque_entrada_list' %}">
            <button type="button" class="btn btn-danger">
                <span class="fa fa-undo "></span> voltar
            </button>
        </a>
    </span>
</h2>
<hr>

<form method="POST" novalidate>
    {% csrf_token %}

    <div>
        {{ form|crispy }}
    </div>

    <div>
        <legend style="border-bottom: 1px solid #e5e5e5;">Produtos</legend>
          <div id="estoque" class="form_inline mb-2 mr-sm-2">
            {{ formset }}
          </div>
    </div>


    <span id="add-item">
        <a href="">
             <button type="submit" class="btn btn-info" style="margin-top:10px;">
                <span class="fa fa-plus"></span> adicionar
             </button>
        </a>
    </span>

    <div class="row float-right">
      <div class="col-sm-12" style="margin-top: 10px;">
        <div class="form-group-inline buttons">
          <button class="btn btn-primary" value="Save">
            <i class="fa fa-floppy-o"></i>
            Salvar
          </button>
          <a href="{% url 'estoque:estoque_entrada_list' %}" class="btn btn-danger">
            <i class="fa fa-times"></i>
            Cancelar
          </a>
        </div>
      </div>
    </div>
</form>

{% endblock %}


{% block js %}

  <script type="text/html" id="item-estoque">
    <div id="item-__prefix__" class="form-group">
        {{ formset.empty_form }}
    </div>
  </script>


{% endblock js %}
