{% extends "base.html" %}

{% block content %}
<span class="pull-right">
    <a href="{% url 'produto:produto_list' %}">
        <button type="button" class="btn btn-danger">
            <span class="fa fa-undo "></span> voltar
        </button>
    </a>
</span>

<h1>
{{ object }}
</h1>

<div class="col-sm-6">
    <table class="table table-user-information">
      <tbody>
        <tr>
          <th class="text-right">Importado</th>
          <td>
            {% if object.importado %}
              <i class="fa fa-check-circle ok"></i>
            {% else %}
              <i class="fa fa-minus-circle no"></i>
            {% endif %}
          </td>
        </tr>
        <tr>
          <th class="text-right">NCM</th>
          <td>{{ object.ncm }}</td>
        </tr>
        <tr>
          <th class="text-right">Preço</th>
          <td>R$ {{ object.preco }}</td>
        </tr>
        <tr>
          <th class="text-right">Estoque</th>
          <td>{{ object.estoque }}</td>
        </tr>
        <tr>
          <th class="text-right">Estoque mínimo</th>
          <td>{{ object.estoque_minimo }}</td>
        </tr>
      </tbody>
    </table>
</div>
<div>
    <span class="pull-right">
        <a href="">
            <button type="button" class="btn btn-warning">
                <span class="fa fa-pencil"></span> Editar
            </button>
        </a>
    </span>
</div>

{% endblock %}
